<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#121214" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="grill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4b5563"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  
  <!-- Outer circle background -->
  <rect width="100%" height="100%" fill="#121214" rx="110"/>
  
  <!-- Background Glow -->
  <circle cx="256" cy="270" r="180" fill="url(#glow)"/>
  
  <!-- Embers sparks -->
  <circle cx="210" cy="220" r="8" fill="#facc15" opacity="0.8"/>
  <circle cx="300" cy="200" r="6" fill="#f97316" opacity="0.9"/>
  <circle cx="170" cy="250" r="10" fill="#ef4444" opacity="0.7"/>
  <circle cx="340" cy="240" r="7" fill="#facc15" opacity="0.8"/>

  <!-- Chulengo (Grill) Base / Fire Bowl -->
  <path d="M 128,260 A 128,128 0 0,0 384,260 Z" fill="url(#grill)" stroke="#111827" stroke-width="8"/>
  <rect x="120" y="254" width="272" height="12" rx="6" fill="#374151" stroke="#111827" stroke-width="4"/>

  <!-- Glowing Fire/Coals inside -->
  <path d="M 148,254 Q 256,170 364,254" fill="url(#fire)" opacity="0.9"/>
  <path d="M 180,254 Q 256,190 332,254" fill="#facc15" opacity="0.95"/>

  <!-- Grill Grates -->
  <line x1="150" y1="254" x2="150" y2="242" stroke="#111827" stroke-width="6" stroke-linecap="round"/>
  <line x1="180" y1="254" x2="180" y2="240" stroke="#111827" stroke-width="6" stroke-linecap="round"/>
  <line x1="210" y1="254" x2="210" y2="238" stroke="#111827" stroke-width="6" stroke-linecap="round"/>
  <line x1="240" y1="254" x2="240" y2="236" stroke="#111827" stroke-width="6" stroke-linecap="round"/>
  <line x1="270" y1="254" x2="270" y2="236" stroke="#111827" stroke-width="6" stroke-linecap="round"/>
  <line x1="300" y1="254" x2="300" y2="238" stroke="#111827" stroke-width="6" stroke-linecap="round"/>
  <line x1="330" y1="254" x2="330" y2="240" stroke="#111827" stroke-width="6" stroke-linecap="round"/>
  <line x1="360" y1="254" x2="360" y2="242" stroke="#111827" stroke-width="6" stroke-linecap="round"/>

  <!-- Metal stand (cross legs) -->
  <line x1="190" y1="360" x2="150" y2="450" stroke="#374151" stroke-width="12" stroke-linecap="round"/>
  <line x1="322" y1="360" x2="362" y2="450" stroke="#374151" stroke-width="12" stroke-linecap="round"/>
  <line x1="190" y1="360" x2="322" y2="360" stroke="#374151" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Ground Shadow/Debris -->
  <ellipse cx="256" cy="455" rx="130" ry="10" fill="#111827" opacity="0.6"/>

  <!-- Text / Accent ribbon at the bottom -->
  <path d="M110,400 Q256,430 402,400" fill="none" stroke="#ef4444" stroke-width="4" stroke-dasharray="10 5"/>
</svg>
